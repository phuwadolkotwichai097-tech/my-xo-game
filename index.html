<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvBcOT1ZzasAVzfksDE2ubWf55dd_jV_I",
        authDomain: "my-xo-game-ddf8e.firebaseapp.com",
        databaseURL: "https://my-xo-game-ddf8e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-xo-game-ddf8e",
        storageBucket: "my-xo-game-ddf8e.firebasestorage.app",
        messagingSenderId: "121057994178",
        appId: "1:121057994178:web:17b25fc67355e2baf1a25b",
        measurementId: "G-WK8CZQNFKF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let gameRef, roomId, myRole, isMatchOver = false, timerStarted = false;
    let cells = Array(9).fill(''), currentPlayer = 'X', gameOver = false, placedCount = {X:0, O:0}, timeLeft = {X:60, O:60}, isCountingDown = false, scores = {X:0, O:0};
    let draggedFromIdx = null, isFromTray = false;

    // --- Matchmaking & Room Creation ---
    
    // ฟังก์ชันรอฟังว่าห้องพร้อมหรือยัง (มีคนเข้ามาครบ)
    function listenForOpponent(rId) {
        const statusRef = ref(db, 'rooms/' + rId + '/status');
        const unsubscribe = onValue(statusRef, (snap) => {
            if (snap.val() === 'playing') {
                unsubscribe(); // เลิกฟังเมื่อเริ่มเกมแล้ว
                startSession();
            }
        });
    }

    window.findQuickMatch = async () => {
        setLobbyActive(false);
        document.getElementById('matchmaking-status').textContent = "🔍 SEARCHING FOR OPPONENT...";
        
        const snap = await get(ref(db, 'rooms'));
        let foundRid = null;
        if (snap.exists()) {
            const rs = snap.val();
            for (let id in rs) { 
                if (rs[id].status === 'waiting' && !rs[id].playerO) { foundRid = id; break; } 
            }
        }

        if (foundRid) {
            // เจอห้องว่าง: เข้าเป็น Player O และสั่งเริ่มเกมทันที
            roomId = foundRid; myRole = 'O';
            await update(ref(db, 'rooms/' + roomId), { 
                playerO: true, 
                status: 'playing', 
                isCountingDown: true 
            });
            startSession();
        } else {
            // ไม่เจอห้อง: สร้างห้องใหม่เป็น Player X และรออยู่หน้า Lobby
            roomId = "Q_" + Math.floor(1000 + Math.random() * 9000); myRole = 'X';
            await set(ref(db, 'rooms/' + roomId), { 
                status: 'waiting', cells: Array(9).fill(''), currentPlayer: 'X', gameOver: false, 
                placedCount: {X:0, O:0}, timeLeft: {X:60, O:60}, isCountingDown: false, 
                playerX: true, playerO: false, scores: {X:0, O:0} 
            });
            listenForOpponent(roomId);
        }
    };

    window.createPrivateRoom = async () => {
        setLobbyActive(false);
        roomId = Math.floor(1000 + Math.random() * 9000).toString(); myRole = 'X';
        await set(ref(db, 'rooms/' + roomId), { 
            status: 'waiting', cells: Array(9).fill(''), currentPlayer: 'X', gameOver: false, 
            placedCount: {X:0, O:0}, timeLeft: {X:60, O:60}, isCountingDown: false, 
            playerX: true, playerO: false, scores: {X:0, O:0} 
        });
        document.getElementById('matchmaking-status').textContent = `CODE: ${roomId} (WAITING FOR FRIEND...)`;
        listenForOpponent(roomId);
    };

    window.joinPrivateRoom = async () => {
        roomId = document.getElementById('room-input').value.trim();
        if (!roomId) return alert("Enter Code");
        const snap = await get(ref(db, 'rooms/' + roomId));
        if(!snap.exists()) return alert("Room not found");
        if(snap.val().status !== 'waiting') return alert("Room is already full or finished");

        setLobbyActive(false);
        myRole = 'O'; 
        await update(ref(db, 'rooms/' + roomId), { 
            playerO: true, 
            status: 'playing', 
            isCountingDown: true 
        });
        startSession();
    };

    function setLobbyActive(active) {
        document.getElementById('btn-quick').disabled = !active;
        document.getElementById('btn-create').disabled = !active;
        document.getElementById('btn-join').disabled = !active;
        document.getElementById('matchmaking-status').style.display = active ? 'none' : 'block';
    }

    // --- Core Game Logic ---
    function startSession() {
        gameRef = ref(db, 'rooms/' + roomId);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        onDisconnect(gameRef).remove();

        onValue(gameRef, (snap) => {
            const d = snap.val(); if (!d || isMatchOver) return;
            cells = d.cells; currentPlayer = d.currentPlayer; gameOver = d.gameOver;
            placedCount = d.placedCount; timeLeft = d.timeLeft; scores = d.scores;
            
            if (isCountingDown !== d.isCountingDown && d.isCountingDown) runCountdown();
            isCountingDown = d.isCountingDown;

            document.getElementById('score-x').textContent = scores.X;
            document.getElementById('score-o').textContent = scores.O;
            document.getElementById('status-text').textContent = `ROOM: ${roomId} | ROLE: ${myRole}`;
            updateUI();
            if (gameOver) handleRoundEnd();
        });
        
        if (!timerStarted) {
            timerStarted = true;
            setInterval(() => {
                // ลดเวลาเฉพาะเจ้าของตา และต้องไม่ใช่ช่วงนับถอยหลังเริ่มเกม
                if (currentPlayer === myRole && !gameOver && !isCountingDown && !isMatchOver) {
                    timeLeft[myRole]--; 
                    update(gameRef, { [`timeLeft/${myRole}`]: timeLeft[myRole] });
                    if (timeLeft[myRole] <= 0) update(gameRef, { gameOver: true });
                }
            }, 1000);
        }
    }

    function handleRoundEnd() {
        if (isMatchOver) return;
        const win = checkWin();
        let roundWinner = win ? (currentPlayer === 'X' ? 'X' : 'O') : (timeLeft.X <= 0 ? 'O' : 'X');
        if (myRole === 'X') {
            const newScores = { ...scores }; newScores[roundWinner]++;
            if (newScores.X >= 2 || newScores.O >= 2) {
                setTimeout(() => { update(gameRef, { scores: newScores, status: 'finished', gameOver: true }); showFinalResult(roundWinner); }, 500);
            } else {
                setTimeout(() => { 
                    update(gameRef, { 
                        cells: Array(9).fill(''), currentPlayer: 'X', gameOver: false, 
                        placedCount: {X:0, O:0}, timeLeft: {X:60, O:60}, isCountingDown: true, scores: newScores 
                    }); 
                }, 2000);
            }
        } else {
            get(ref(db, 'rooms/' + roomId + '/status')).then(s => { if(s.val()==='finished') showFinalResult(roundWinner); });
        }
    }

    function showFinalResult(winner) {
        if (isMatchOver) return; isMatchOver = true;
        document.getElementById('result-screen').style.display = 'flex';
        const winDisp = document.getElementById('winner-display');
        winDisp.textContent = `${winner} WIN!`;
        winDisp.style.color = winner === 'X' ? 'var(--neon-pink)' : 'var(--neon-cyan)';
        let sec = 7;
        const itv = setInterval(() => { sec--; document.getElementById('back-timer').textContent = sec; if (sec <= 0) { clearInterval(itv); location.reload(); } }, 1000);
    }

    function updateUI() {
        document.getElementById('time-x').textContent = (timeLeft.X || 0) + 's';
        document.getElementById('time-o').textContent = (timeLeft.O || 0) + 's';
        const b = document.getElementById('board'); b.innerHTML = '';
        cells.forEach((v, i) => {
            const c = document.createElement('div'); c.className = 'cell'; c.textContent = v;
            if (v === 'X') c.style.color = 'var(--neon-pink)';
            if (v === 'O') c.style.color = 'var(--neon-cyan)';
            if (v === myRole && currentPlayer === myRole && placedCount[myRole] >= 3 && !gameOver && !isCountingDown) c.draggable = true;
            c.ondragstart = (e) => { draggedFromIdx = i; isFromTray = false; e.dataTransfer.setData('text', i); };
            c.ondragover = (e) => { e.preventDefault(); if (!cells[i]) c.classList.add('drag-over'); };
            c.ondragleave = () => c.classList.remove('drag-over');
            c.ondrop = (e) => { e.preventDefault(); handleDrop(i); };
            b.appendChild(c);
        });
        const tx = document.getElementById('tray-x'), to = document.getElementById('tray-o');
        tx.innerHTML = ''; to.innerHTML = '';
        document.getElementById('zone-x').className = 'player-zone' + (currentPlayer === 'X' ? ' active-zone' : '');
        document.getElementById('zone-o').className = 'player-zone' + (currentPlayer === 'O' ? ' active-zone' : '');
        for (let i = (placedCount.O || 0); i < 3; i++) to.appendChild(createP('O'));
        for (let i = (placedCount.X || 0); i < 3; i++) tx.appendChild(createP('X'));
    }

    function createP(t) {
        const p = document.createElement('div'); p.className = 'piece'; p.textContent = t;
        p.style.background = t === 'X' ? 'var(--neon-pink)' : 'var(--neon-cyan)';
        p.style.boxShadow = `0 0 10px ${t === 'X' ? 'var(--neon-pink)' : 'var(--neon-cyan)'}`;
        if (currentPlayer === t && myRole === t && !gameOver && !isCountingDown) p.draggable = true;
        p.ondragstart = (e) => { isFromTray = true; e.dataTransfer.setData('text', 'tray'); };
        return p;
    }

    function handleDrop(targetIdx) {
        if (gameOver || isCountingDown || currentPlayer !== myRole || cells[targetIdx] !== '') return;
        let ok = false;
        let nextCells = [...cells];
        let nextPlaced = {...placedCount};
        if (isFromTray && nextPlaced[currentPlayer] < 3) { nextCells[targetIdx] = currentPlayer; nextPlaced[currentPlayer]++; ok = true; }
        else if (!isFromTray && draggedFromIdx !== null && nextCells[draggedFromIdx] === currentPlayer) { nextCells[draggedFromIdx] = ''; nextCells[targetIdx] = currentPlayer; ok = true; }
        if (ok) {
            const hasWin = checkWinWithBoard(nextCells);
            update(gameRef, { 
                cells: nextCells, 
                placedCount: nextPlaced, 
                currentPlayer: hasWin ? currentPlayer : (currentPlayer === 'X' ? 'O' : 'X'), 
                gameOver: hasWin 
            });
        }
    }

    function checkWin() { return checkWinWithBoard(cells); }
    function checkWinWithBoard(b) {
        const p = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return p.some(a => b[a[0]] && b[a[0]] === b[a[1]] && b[a[1]] === b[a[2]]);
    }

    async function runCountdown() {
        const el = document.getElementById('big-countdown'); el.style.display = 'block';
        for (let i = 3; i > 0; i--) { el.textContent = i; await new Promise(r => setTimeout(r, 1000)); }
        el.style.display = 'none'; if (myRole === 'X') update(gameRef, { isCountingDown: false });
    }
</script>
