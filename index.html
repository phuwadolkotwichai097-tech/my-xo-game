<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO NEON - PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="big-countdown">3</div>

<div class="container">
    <div id="result-screen">
        <h1 id="winner-display">-</h1>
        <p id="result-reason">MATCH FINISHED</p>
        <button onclick="location.reload()">BACK TO LOBBY</button>
    </div>

    <div id="lobby">
        <h2 class="neon-text">XO NEON</h2>
        <button id="btn-quick" onclick="findQuickMatch()">⚡ QUICK MATCH</button>
        <div id="match-status" style="display:none;">SEARCHING...</div>
        
        <div class="private-room-box">
            <input type="text" id="room-input" placeholder="ROOM CODE">
            <button id="btn-create" onclick="createPrivateRoom()" class="btn-outline">CREATE PRIVATE</button>
            <button id="btn-join" onclick="joinPrivateRoom()" class="btn-blue">JOIN ROOM</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="score-board">
            <div><small>X-PLAYER</small><div id="score-x" class="score-val">0</div></div>
            <div class="vs-text">VS</div>
            <div><small>O-PLAYER</small><div id="score-o" class="score-val">0</div></div>
        </div>
        
        <div id="zone-o" class="player-zone">
            <div class="timer-display" id="time-o">60s</div>
            <div id="tray-o" class="tray"></div>
        </div>
        
        <div id="board" class="board"></div>
        
        <div id="zone-x" class="player-zone">
            <div id="tray-x" class="tray"></div>
            <div class="timer-display" id="time-x">60s</div>
        </div>
    </div>
</div>

<script type="module" src="game.js"></script>
</body>
</html>
