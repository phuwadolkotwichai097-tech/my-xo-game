<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO NEON - ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b1e;
            --card: rgba(22, 33, 62, 0.9);
            --neon-cyan: #00fff2;
            --neon-pink: #ff007b;
            --neon-yellow: #f1c40f;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Orbitron', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background: var(--bg); 
            color: var(--text); overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1b1b3a 0%, #0a0b1e 100%);
        }

        .container { 
            width: 95%; max-width: 400px; text-align: center; padding: 20px; 
            background: var(--card); border-radius: 25px; 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; 
        }

        /* Score Board */
        .score-board { 
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; 
            margin-bottom: 20px; border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 242, 0.2);
        }
        .score-val { font-size: 2rem; color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }

        /* Game UI */
        #game-ui { display: none; }
        
        .board { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; 
            margin: 20px auto; width: 100%; aspect-ratio: 1/1;
        }
        
        .cell { 
            background: rgba(255,255,255,0.05); border-radius: 15px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: none;
        }

        /* Glow Effects */
        .cell[draggable="true"] { border-color: var(--neon-cyan); box-shadow: inset 0 0 15px rgba(0, 255, 242, 0.3); cursor: grab; }
        .cell.drag-over { background: rgba(0, 255, 242, 0.2); border: 2px dashed var(--neon-cyan); transform: scale(0.95); }

        .player-zone { 
            padding: 12px; border-radius: 20px; transition: 0.4s; 
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .active-zone { background: rgba(0, 255, 242, 0.1); border: 1px solid var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 255, 242, 0.1); }

        .timer-display { font-size: 1.2rem; font-weight: bold; color: var(--neon-cyan); }

        .piece { 
            width: 45px; height: 45px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; font-weight: bold; box-shadow: 0 0 15px rgba(0,0,0,0.3);
            touch-action: none; cursor: grab;
        }

        /* Overlay */
        #result-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); border-radius: 25px; display: none; 
            flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }
        
        #lobby { display: flex; flex-direction: column; gap: 15px; }
        button { 
            padding: 16px; cursor: pointer; border: none; border-radius: 15px; 
            font-family: 'Orbitron', sans-serif; font-weight: bold; transition: 0.3s;
            background: var(--neon-pink); color: white; width: 100%;
        }
        button:hover { transform: scale(1.02); filter: brightness(1.2); }
        
        #big-countdown { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 12rem; font-weight: bold; color: var(--neon-cyan); z-index: 3000; 
            display: none; pointer-events: none; text-shadow: 0 0 40px var(--neon-cyan);
        }
    </style>
</head>
<body>

<div id="big-countdown">3</div>

<div class="container">
    <div id="result-screen">
        <h1 id="winner-display" style="font-size: 3rem; margin-bottom: 0;">-</h1>
        <p style="color: var(--neon-cyan); letter-spacing: 2px;">MATCH FINISHED</p>
        <button onclick="location.reload()" style="width: 200px; background: var(--neon-cyan); color: var(--bg); margin-top: 20px;">BACK TO LOBBY</button>
        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.5;">Auto reload in <span id="back-timer">7</span>s</p>
    </div>

    <div id="lobby">
        <h2 style="color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan);">XO NEON ONLINE</h2>
        <button id="btn-quick" onclick="findQuickMatch()">⚡ QUICK MATCH</button>
        <div id="matchmaking-status" style="display:none; color: var(--neon-cyan); font-size: 0.8rem; margin-top: 10px;">WAITING FOR OPPONENT...</div>
        
        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <input type="text" id="room-input" placeholder="ROOM CODE" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--neon-pink); background: rgba(0,0,0,0.3); color: white; text-align: center; margin-bottom: 10px; font-family: 'Orbitron';">
            <button onclick="createPrivateRoom()" style="background: transparent; border: 1px solid var(--neon-pink); margin-bottom: 10px;">CREATE PRIVATE</button>
            <button style="background: #3498db;" onclick="joinPrivateRoom()">JOIN ROOM</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="score-board">
            <div><small style="opacity: 0.6;">PLAYER X</small><div id="score-x" class="score-val">0</div></div>
            <div style="font-size: 1.2rem; opacity: 0.3;">VS</div>
            <div><small style="opacity: 0.6;">PLAYER O</small><div id="score-o" class="score-val">0</div></div>
        </div>

        <div id="zone-o" class="player-zone">
            <div class="timer-display" id="time-o">60s</div>
            <div id="tray-o" style="display:flex; gap:8px;"></div>
        </div>

        <div id="board" class="board">
            </div>

        <div id="zone-x" class="player-zone">
            <div id="tray-x" style="display:flex; gap:8px;"></div>
            <div class="timer-display" id="time-x">60s</div>
        </div>
        
        <p id="status-text" style="font-size: 0.7rem; margin-top: 15px; opacity: 0.5;"></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    // ใช้ Config จากที่คุณส่งมา
    const firebaseConfig = {
        apiKey: "AIzaSyAvBcOT1ZzasAVzfksDE2ubWf55dd_jV_I",
        authDomain: "my-xo-game-ddf8e.firebaseapp.com",
        databaseURL: "https://my-xo-game-ddf8e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-xo-game-ddf8e",
        storageBucket: "my-xo-game-ddf8e.firebasestorage.app",
        messagingSenderId: "121057994178",
        appId: "1:121057994178:web:17b25fc67355e2baf1a25b",
        measurementId: "G-WK8CZQNFKF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let gameRef, roomId, myRole, isMatchOver = false;
    let cells = Array(9).fill(''), currentPlayer = 'X', gameOver = false, placedCount = {X:0, O:0}, timeLeft = {X:60, O:60}, isCountingDown = false, scores = {X:0, O:0};
    let draggedFromIdx = null, isFromTray = false;

    window.findQuickMatch = async () => {
        document.getElementById('btn-quick').disabled = true;
        document.getElementById('matchmaking-status').style.display = 'block';
        const snap = await get(ref(db, 'rooms'));
        let foundRid = null;
        if (snap.exists()) {
            const rs = snap.val();
            for (let id in rs) { if (rs[id].status === 'waiting' && !rs[id].playerO) { foundRid = id; break; } }
        }
        if (foundRid) {
            roomId = foundRid; myRole = 'O';
            await update(ref(db, 'rooms/' + roomId), { playerO: true, status: 'playing', isCountingDown: true });
            startSession();
        } else {
            roomId = "Q_" + Math.floor(1000 + Math.random() * 9000); myRole = 'X';
            await set(ref(db, 'rooms/' + roomId), { 
                status: 'waiting', cells: Array(9).fill(''), currentPlayer: 'X', gameOver: false, 
                placedCount: {X:0, O:0}, timeLeft: {X:60, O:60}, isCountingDown: false, 
                playerX: true, playerO: false, scores: {X:0, O:0} 
            });
            onValue(ref(db, 'rooms/' + roomId + '/playerO'), (s) => { if(s.val() === true) startSession(); });
        }
    };

    window.createPrivateRoom = () => {
        roomId = Math.floor(1000 + Math.random() * 9000).toString(); myRole = 'X';
        set(ref(db, 'rooms/' + roomId), { status: 'private', cells: Array(9).fill(''), currentPlayer: 'X', gameOver: false, placedCount: {X:0, O:0}, timeLeft: {X:60, O:60}, isCountingDown: false, playerX: true, playerO: false, scores: {X:0, O:0} });
        startSession();
    };

    window.joinPrivateRoom = () => {
        roomId = document.getElementById('room-input').value.trim();
        if (!roomId) return alert("Enter Code");
        myRole = 'O'; update(ref(db, 'rooms/' + roomId), { playerO: true, status: 'playing', isCountingDown: true });
        startSession();
    };

    function startSession() {
        gameRef = ref(db, 'rooms/' + roomId);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        onDisconnect(gameRef).remove();

        onValue(gameRef, (snap) => {
            const d = snap.val(); if (!d || isMatchOver) return;
            cells = d.cells; currentPlayer = d.currentPlayer; gameOver = d.gameOver;
            placedCount = d.placedCount; timeLeft = d.timeLeft; scores = d.scores;
            if (isCountingDown !== d.isCountingDown && d.isCountingDown) runCountdown();
            isCountingDown = d.isCountingDown;
            document.getElementById('score-x').textContent = scores.X;
            document.getElementById('score-o').textContent = scores.O;
            document.getElementById('status-text').textContent = `ROOM: ${roomId} | ROLE: ${myRole}`;
            updateUI();
            if (gameOver) handleRoundEnd();
        });
        
        setInterval(() => {
            if (currentPlayer === myRole && !gameOver && !isCountingDown && !isMatchOver) {
                timeLeft[myRole]--; update(gameRef, { timeLeft });
                if (timeLeft[myRole] <= 0) update(gameRef, { gameOver: true });
            }
        }, 1000);
    }

    function handleRoundEnd() {
        if (isMatchOver) return;
        const win = checkWin();
        let roundWinner = win ? (currentPlayer === 'X' ? 'X' : 'O') : (timeLeft.X <= 0 ? 'O' : 'X');
        if (myRole === 'X') {
            const newScores = { ...scores }; newScores[roundWinner]++;
            if (newScores.X >= 2 || newScores.O >= 2) {
                setTimeout(() => { update(gameRef, { scores: newScores, status: 'finished' }); showFinalResult(roundWinner); }, 500);
            } else {
                setTimeout(() => { update(gameRef, { cells: Array(9).fill(''), currentPlayer: 'X', gameOver: false, placedCount: {X:0, O:0}, timeLeft: {X:60, O:60}, isCountingDown: true, scores: newScores }); }, 2000);
            }
        } else {
            get(ref(db, 'rooms/' + roomId + '/status')).then(s => { if(s.val()==='finished') showFinalResult(roundWinner); });
        }
    }

    function showFinalResult(winner) {
        if (isMatchOver) return; isMatchOver = true;
        document.getElementById('result-screen').style.display = 'flex';
        const winDisp = document.getElementById('winner-display');
        winDisp.textContent = `${winner} WIN!`;
        winDisp.style.color = winner === 'X' ? 'var(--neon-pink)' : 'var(--neon-cyan)';
        let sec = 7;
        setInterval(() => { sec--; document.getElementById('back-timer').textContent = sec; if (sec <= 0) location.reload(); }, 1000);
    }

    function updateUI() {
        document.getElementById('time-x').textContent = timeLeft.X + 's';
        document.getElementById('time-o').textContent = timeLeft.O + 's';
        const b = document.getElementById('board'); b.innerHTML = '';
        
        // สร้างตาราง 9 ช่อง
        cells.forEach((v, i) => {
            const c = document.createElement('div'); 
            c.className = 'cell'; 
            c.textContent = v;
            if (v === 'X') c.style.color = 'var(--neon-pink)';
            if (v === 'O') c.style.color = 'var(--neon-cyan)';
            
            // ลากหมากในตารางได้เมื่อวางครบ 3 ตัว
            if (v === myRole && currentPlayer === myRole && placedCount[myRole] >= 3 && !gameOver && !isCountingDown) {
                c.draggable = true;
            }

            c.ondragstart = (e) => { draggedFromIdx = i; isFromTray = false; e.dataTransfer.setData('text', i); };
            c.ondragover = (e) => { e.preventDefault(); if (!cells[i]) c.classList.add('drag-over'); };
            c.ondragleave = () => c.classList.remove('drag-over');
            c.ondrop = (e) => { e.preventDefault(); handleDrop(i); };
            b.appendChild(c);
        });

        // อัปเดตหมากในถาด
        const tx = document.getElementById('tray-x'), to = document.getElementById('tray-o');
        tx.innerHTML = ''; to.innerHTML = '';
        document.getElementById('zone-x').className = 'player-zone' + (currentPlayer === 'X' ? ' active-zone' : '');
        document.getElementById('zone-o').className = 'player-zone' + (currentPlayer === 'O' ? ' active-zone' : '');
        
        for (let i = (placedCount.O || 0); i < 3; i++) to.appendChild(createP('O'));
        for (let i = (placedCount.X || 0); i < 3; i++) tx.appendChild(createP('X'));
    }

    function createP(t) {
        const p = document.createElement('div'); p.className = 'piece'; p.textContent = t;
        p.style.background = t === 'X' ? 'var(--neon-pink)' : 'var(--neon-cyan)';
        p.style.boxShadow = `0 0 10px ${t === 'X' ? 'var(--neon-pink)' : 'var(--neon-cyan)'}`;
        if (currentPlayer === t && myRole === t && !gameOver && !isCountingDown) p.draggable = true;
        p.ondragstart = (e) => { isFromTray = true; e.dataTransfer.setData('text', 'tray'); };
        return p;
    }

    function handleDrop(targetIdx) {
        if (gameOver || isCountingDown || currentPlayer !== myRole || cells[targetIdx] !== '') return;
        let ok = false;
        if (isFromTray && placedCount[currentPlayer] < 3) { cells[targetIdx] = currentPlayer; placedCount[currentPlayer]++; ok = true; }
        else if (!isFromTray && draggedFromIdx !== null && cells[draggedFromIdx] === currentPlayer) { cells[draggedFromIdx] = ''; cells[targetIdx] = currentPlayer; ok = true; }
        if (ok) update(gameRef, { cells, placedCount, currentPlayer: checkWin() ? currentPlayer : (currentPlayer === 'X' ? 'O' : 'X'), gameOver: checkWin() });
    }

    function checkWin() {
        const p = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return p.some(a => cells[a[0]] && cells[a[0]] === cells[a[1]] && cells[a[1]] === cells[a[2]]);
    }

    async function runCountdown() {
        const el = document.getElementById('big-countdown'); el.style.display = 'block';
        for (let i = 3; i > 0; i--) { el.textContent = i; await new Promise(r => setTimeout(r, 1000)); }
        el.style.display = 'none'; if (myRole === 'X') update(gameRef, { isCountingDown: false });
    }
</script>
</body>
</html>
