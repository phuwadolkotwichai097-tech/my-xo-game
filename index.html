<style>
    /* ปรับแต่งให้รองรับการลากบนมือถือได้ลื่นขึ้น */
    .cell, .piece { 
        touch-action: none; /* ป้องกันการเลื่อนหน้าจอขณะลากหมาก */
        user-select: none;
        -webkit-user-drag: element;
    }
    .cell[draggable="true"] {
        cursor: move;
        border: 2px dashed #4ecca3; /* ไฮไลท์หมากที่สามารถลากเดินได้ */
    }
</style>

<script type="module">
    // ... (ส่วนการเชื่อมต่อ Firebase เหมือนเดิม) ...

    function updateUI() {
        document.getElementById('time-x').textContent = Math.max(0, timeLeft.X);
        document.getElementById('time-o').textContent = Math.max(0, timeLeft.O);
        const b = document.getElementById('board'); b.innerHTML = '';
        
        cells.forEach((v, i) => {
            const c = document.createElement('div'); 
            c.className = 'cell'; 
            c.textContent = v;

            // เงื่อนไข: เป็นตาเรา + หมากของเรา + วางครบ 3 ตัวแล้ว + เกมยังไม่จบ
            if (v === myRole && currentPlayer === myRole && placedCount[myRole] >= 3 && !gameOver && !isCountingDown) {
                c.draggable = true;
            }

            c.ondragstart = (e) => {
                e.dataTransfer.setData('fromIdx', i); // เก็บตำแหน่งเริ่มต้น
                window.isFromTray = false; // ยืนยันว่าลากจากในตาราง
            };

            c.ondragover = (e) => e.preventDefault();
            
            c.ondrop = (e) => {
                const fromIdx = e.dataTransfer.getData('fromIdx');
                handleMove(i, fromIdx);
            };
            
            b.appendChild(c);
        });

        // อัปเดตหมากในถาด (Tray)
        updateTrays();
    }

    function updateTrays() {
        const tx = document.getElementById('tray-x'), to = document.getElementById('tray-o');
        tx.innerHTML = ''; to.innerHTML = '';
        
        document.getElementById('zone-x').classList.toggle('active-zone', currentPlayer === 'X');
        document.getElementById('zone-o').classList.toggle('active-zone', currentPlayer === 'O');

        // สร้างหมากในถาด (เฉพาะตอนที่ยังวางไม่ครบ 3 ตัว)
        if (placedCount.O < 3) {
            for (let i = placedCount.O; i < 3; i++) {
                const p = createPiece('O');
                if (myRole === 'O' && currentPlayer === 'O' && !gameOver && !isCountingDown) p.draggable = true;
                to.appendChild(p);
            }
        }
        if (placedCount.X < 3) {
            for (let i = placedCount.X; i < 3; i++) {
                const p = createPiece('X');
                if (myRole === 'X' && currentPlayer === 'X' && !gameOver && !isCountingDown) p.draggable = true;
                tx.appendChild(p);
            }
        }
    }

    function createPiece(type) {
        const p = document.createElement('div');
        p.className = 'piece'; p.textContent = type;
        p.ondragstart = (e) => {
            window.isFromTray = true; // ยืนยันว่าลากจากถาดข้างนอก
        };
        return p;
    }

    function handleMove(targetIdx, fromIdx) {
        if (gameOver || isCountingDown || currentPlayer !== myRole || cells[targetIdx] !== '') return;

        let moveValid = false;

        // กรณีที่ 1: ลากจากถาด (Tray)
        if (window.isFromTray && placedCount[myRole] < 3) {
            cells[targetIdx] = myRole;
            placedCount[myRole]++;
            moveValid = true;
        } 
        // กรณีที่ 2: ลากจากช่องหนึ่งไปอีกช่องหนึ่ง (Move)
        else if (!window.isFromTray && fromIdx !== "" && cells[fromIdx] === myRole) {
            cells[fromIdx] = ''; // ล้างช่องเก่า
            cells[targetIdx] = myRole; // ใส่ช่องใหม่
            moveValid = true;
        }

        if (moveValid) {
            const win = checkWin();
            // ส่งค่าขึ้น Firebase ทันที
            update(gameRef, { 
                cells, 
                placedCount, 
                currentPlayer: win ? currentPlayer : (currentPlayer === 'X' ? 'O' : 'X'), 
                gameOver: win 
            });
        }
    }
</script>
